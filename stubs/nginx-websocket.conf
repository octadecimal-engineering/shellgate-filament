# Shell Gate - Nginx WebSocket Proxy Configuration
#
# This file should be included in a server{} block or the location
# should be copied to an existing configuration.
#
# Usage:
#   include /path/to/stubs/shell-gate/nginx-websocket.conf;
#
# or copy the location {} contents to your configuration.

# Upstream for terminal gateway
upstream shell_gate_gateway {
    server 127.0.0.1:7681;
    keepalive 32;
}

# WebSocket location
location /ws/terminal {
    proxy_pass http://shell_gate_gateway;
    proxy_http_version 1.1;

    # WebSocket upgrade headers
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Forward client information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-lived WebSocket connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Buffering
    proxy_buffering off;
    proxy_cache off;

    # Request size limit (optional)
    # client_max_body_size 1m;
}

# Health check endpoint (optional)
location /ws/terminal/health {
    proxy_pass http://shell_gate_gateway/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    # Short timeouts for health check
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
}
