# Shell Gate Gateway - Docker Compose
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#   docker-compose down

services:
  gateway:
    build: .
    container_name: shell-gate-gateway
    restart: unless-stopped
    ports:
      - "7681:7681"
    environment:
      - PORT=7681
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - MAX_SESSIONS=${MAX_SESSIONS:-100}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-0}
      - IDLE_TIMEOUT=${IDLE_TIMEOUT:-1800}
      - SHELL=/bin/bash
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7681/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Security options
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
